<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Tuen Teen Book Fair Book Explorer</title>
  <meta name="description" content="Browse curated books by category. Chroma mid-tone theme with modal details, touch-friendly for iPad." />
  <meta name="theme-color" content="#efeefe">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    /* ===== Chroma (mid-tone, color-forward glass) ===== */
    :root{
      /* Base surfaces */
      --bg-base:#efeefe;                 /* soft neutral behind aurora */
      --panel:rgba(255,255,255,.68);     /* glass panels (not stark white) */
      --panel-solid:#ffffff;             /* fallback for old browsers */
      --panel-2:rgba(248,250,255,.6);

      /* Typography */
      --text:#182230;                    /* deep slate for readability */
      --muted:#5b6473;                   /* softer copy */

      /* Lines / chips */
      --border:rgba(24,34,48,.14);       /* clearer than gray-200 */
      --chip:rgba(255,255,255,.62);

      /* Corners, layers, focus */
      --radius:16px;
      --shadow:0 12px 34px rgba(16,24,40,.10);
      --ring:0 0 0 3px rgba(139,92,246,.28);  /* violet ring */

      /* Accents */
      --primary:#7c3aed;   /* violet */
      --accent:#06b6d4;    /* cyan */
      --accent-2:#f97316;  /* orange */

      /* sticky header height (JS updates precise size) */
      --header-h: 76px;

      /* === Clarity patch toggle === */
      --modal-contrast-boost: 1; /* 0 = off, 1 = on */
    }

    *{box-sizing:border-box}
    html, body{height:100%}
    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC","Noto Sans","PingFang TC","Heiti TC", Arial, sans-serif;
      color:var(--text);
      /* Chroma aurora background */
      background:
        radial-gradient(1200px 560px at 10% -8%, rgba(142,197,252,.35), transparent 65%),
        radial-gradient(1200px 620px at 105% -12%, rgba(224,195,252,.30), transparent 65%),
        radial-gradient(1200px 700px at -10% 86%, rgba(167,243,208,.25), transparent 62%),
        radial-gradient(1000px 540px at 50% 110%, rgba(253,230,138,.18), transparent 60%),
        var(--bg-base);
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select:none; user-select:none;
      touch-action:manipulation;
    }

    /* Keep focused/auto-scrolled content below sticky header */
    html { scroll-padding-top: var(--header-h); }
    .card { scroll-margin-top: calc(var(--header-h) + 12px); }

    /* Lock background scroll when modal is open (desktop & iOS) */
    html.body-lock, body.body-lock { overflow:hidden; }
    body.body-lock { position:fixed; width:100%; }

    header{
      position:sticky; top:0; z-index:40;
      background:linear-gradient(to bottom, rgba(255,255,255,.84), rgba(255,255,255,.58), rgba(255,255,255,0));
      backdrop-filter: blur(10px) saturate(120%);
      padding:18px 0 8px;
      border-bottom:1px solid rgba(24,34,48,.08);
    }
    .container{max-width:1180px; margin:0 auto; padding:0 16px}

    .title-row{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
    .brand{display:flex; align-items:center; gap:12px}
    .brand-logo{
      width:46px; height:46px; border-radius:12px;
      background:conic-gradient(from 120deg, #60a5fa, #a78bfa, #34d399, #f59e0b);
      box-shadow: 0 10px 26px rgba(16,24,40,.12);
      flex:0 0 auto;
    }
    h1{margin:0; font-size:1.7rem; letter-spacing:.25px}
    .sub{color:var(--muted); font-size:1rem}

    .top-actions{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
    .controls{display:flex; gap:10px; flex-wrap:wrap}
    .input, select{
      background:var(--panel);
      backdrop-filter: blur(10px) saturate(120%);
      border:1px solid var(--border);
      color:var(--text);
      padding:12px 12px; border-radius:12px; outline:none; min-width:240px; font-size:1rem;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .input::placeholder{ color:rgba(24,34,48,.50); }
    .input:focus, select:focus{ box-shadow:var(--ring); border-color:transparent }

    /* Language button */
    .lang{position:relative}
    .lang-btn{
      display:flex; align-items:center; gap:8px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px; cursor:pointer; font-weight:700; color:var(--text);
      backdrop-filter: blur(10px) saturate(120%);
    }
    .lang-menu{
      position:absolute; right:0; top:110%;
      background:var(--panel);
      border:1px solid var(--border); border-radius:12px; padding:6px; display:none; z-index:20;
      backdrop-filter: blur(10px) saturate(120%);
    }
    .lang.open .lang-menu{display:block}
    .lang-option{
      display:flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:10px; cursor:pointer; white-space:nowrap; color:var(--text);
    }
    .lang-option:hover{background:rgba(24,34,48,.06)}
    .lang-option.active{background:rgba(124,58,237,.12); border:1px solid rgba(124,58,237,.28)}

    .pillbar{margin-top:12px; display:flex; gap:10px; flex-wrap:nowrap; overflow:auto; padding-bottom:6px;}
    .pill{
      background:rgba(255,255,255,.56); color:var(--text);
      border:1px solid var(--border);
      padding:10px 14px;
      border-radius:999px; cursor:pointer; font-size:1rem; white-space:nowrap;
      transition:all .15s ease; flex:0 0 auto;
    }
    .pill:hover{transform:translateY(-2px); background:rgba(255,255,255,.72)}
    .pill.active{border-color:var(--primary); box-shadow: var(--ring); background:rgba(124,58,237,.10); font-weight:800}

    /* === Random button (header) === */
    .rand-btn{
      display:flex; align-items:center; gap:8px;
      background:linear-gradient(135deg, #7c3aed, #06b6d4);
      color:#fff; border:none; padding:10px 14px; border-radius:12px; cursor:pointer; font-weight:800; font-size:1rem;
      box-shadow: 0 6px 18px rgba(124,58,237,.24);
    }
    .rand-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 24px rgba(124,58,237,.3); }
    .rand-btn:focus{ outline:none; box-shadow: var(--ring); }

    main{padding:16px 0 48px}
    .grid{display:grid; grid-template-columns:repeat(12,1fr); gap:20px;}
    @media (max-width:1080px){.grid{grid-template-columns:repeat(9,1fr)}}
    @media (max-width:860px){.grid{grid-template-columns:repeat(6,1fr)}}

    .card{
      position:relative; grid-column:span 3;
      background:var(--panel);
      backdrop-filter: blur(12px) saturate(130%);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      animation:fadeUp .4s ease both;
    }
    .card::after{
      content:""; position:absolute; left:0; top:0; height:4px; width:100%;
      background: var(--accent-gradient, linear-gradient(90deg, var(--primary), var(--accent-2)));
    }
    .card:hover{transform:translateY(-2px); box-shadow:0 18px 46px rgba(16,24,40,.18)}
    .card:active{transform:scale(.99)}
    @media (max-width:1080px){.card{grid-column:span 3}}
    @media (max-width:860px){.card{grid-column:span 6}}

    .card, .card * { filter:none !important; } /* prevent grey look glitches */

    .cover{width:100%; height:210px; object-fit:cover; display:block; background:#e9eef6}
    .card-body{padding:12px 12px 14px}
    .title{margin:0 0 6px; font-weight:800; font-size:1.06rem; line-height:1.28}
    .meta{display:flex; gap:8px; align-items:baseline; color:#677284; font-size:.96rem; margin-bottom:6px; flex-wrap:wrap}
    .meta .dot{width:4px; height:4px; background:#94a3b8; border-radius:50%; display:inline-block}
    .desc{font-size:1rem; color:#2a3444; margin:6px 0 10px; min-height:44px}
    .tags{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 10px}
    .tag{font-size:.84rem; color:#0b1220; background:var(--chip); border:1px solid var(--border); padding:4px 8px; border-radius:999px; font-weight:700}
    .tag.kv{background:#fff}

    .empty{
      text-align:center; color:#5f6b7d; padding:36px;
      border:1px dashed var(--border); border-radius:16px; background:var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px) saturate(120%);
    }
    footer{color:#5f6b7d; text-align:center; padding:26px 10px 34px; font-size:.96rem}

    /* Modal — keep overlay at 0.26 per your preference */
    .modal{
      position:fixed; inset:0; display:grid; place-items:center; padding:22px;
      background:rgba(2,6,23,.26);
      backdrop-filter: blur(8px);
      opacity:0; pointer-events:none; transition: opacity .18s ease;
      z-index:1000;
    }
    .modal.open{opacity:1; pointer-events:auto}
    .modal-panel{
      width:min(720px, 96vw);
      background:var(--panel);
      border:1px solid var(--border); border-radius:18px; box-shadow: 0 28px 80px rgba(16,24,40,.45);
      transform: translateY(8px) scale(.985); opacity:0; transition: transform .2s ease, opacity .2s ease;
      position:relative; overflow:hidden;
      display:flex; flex-direction:column;
      max-height: calc(100vh - 28px);
      backdrop-filter: blur(12px) saturate(130%);
    }
    .modal.open .modal-panel{transform: translateY(0) scale(1); opacity:1}
    .modal-accent{height:6px; background:linear-gradient(90deg, var(--primary), var(--accent-2))}
    .modal-inner{
      display:grid; grid-template-columns:220px 1fr; gap:16px; padding:16px;
      overflow:auto;
      max-height: calc(100vh - 28px - 6px - 70px);
    }
    .modal-cover{width:100%; height:260px; object-fit:cover; border-radius:12px; background:#e9eef6}
    .modal-title{margin:0 0 6px; font-size:1.4rem; font-weight:900}
    .modal-meta{color:#677284; display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px}
    .modal-tags{display:flex; gap:6px; flex-wrap:wrap; margin:4px 0 10px}
    .modal-desc{color:#1f2a3b; line-height:1.68; margin-top:8px; white-space:pre-wrap; word-break:break-word}
    .kvlist{display:grid; grid-template-columns:auto 1fr; gap:8px 12px; margin:8px 0 0}
    .kvlist .key{color:#677284}
    .kvlist .val{color:#182230}
    .modal-actions{display:flex; gap:10px; justify-content:flex-end; padding:0 16px 16px}
    .btn{
      background:linear-gradient(135deg, #7c3aed, #06b6d4);
      color:#fff; border:none; padding:12px 14px; border-radius:12px; cursor:pointer; font-weight:800; font-size:1.02rem;
      box-shadow: 0 6px 18px rgba(124,58,237,.24);
    }
    .btn.ghost{background:#fff; color:#1f2a3b; border:1px solid var(--border)}
    .modal-close{
      position:absolute; top:10px; right:10px; border:1px solid var(--border);
      background:#fff; color:#1f2937; width:42px; height:42px; border-radius:10px; cursor:pointer; font-size:18px;
    }

    @media (max-width:700px){
      .modal-inner{grid-template-columns:1fr}
      .modal-cover{height:260px}
    }

    @keyframes fadeUp{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)}}
    @media (prefers-reduced-motion:reduce){ .card, .modal, .modal-panel{transition:none !important; animation:none !important} }
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    /* =========================
       CHROMA – MODAL CLARITY PATCH
       ========================= */

    /* 1) Slightly more opaque glass with boost */
    .modal-panel{
      background: linear-gradient(
        0deg,
        rgba(255,255,255, calc(0.62 + 0.08 * var(--modal-contrast-boost))) 0%,
        rgba(255,255,255, calc(0.70 + 0.08 * var(--modal-contrast-boost))) 100%
      );
      border: 1px solid rgba(24,34,48, calc(.16 + .08 * var(--modal-contrast-boost)));
    }

    /* 2) Crisper text on glass */
    .modal-title{
      color:#101828;
      text-shadow: 0 1px 0 rgba(255,255,255,.35);
    }
    .modal-meta{
      color:#334155;
      text-shadow: 0 1px 0 rgba(255,255,255,.25);
    }
    .modal-desc{
      color:#0f172a;
      line-height:1.72;
      font-size:1.02rem;
      text-shadow: 0 1px 0 rgba(255,255,255,.28);
    }
    .kvlist .key{
      color:#475569;
      font-weight:600;
      text-shadow: 0 1px 0 rgba(255,255,255,.25);
    }
    .kvlist .val{
      color:#0b1220;
      text-shadow: 0 1px 0 rgba(255,255,255,.25);
    }

    /* 3) Clear tag chips in modal */
    .modal-tags .tag{
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(24,34,48,.14);
      color: #101828;
    }

    /* 4) Cover edge definition */
    .modal-cover{
      background:#eef2f7;
      box-shadow:0 4px 16px rgba(16,24,40,.08);
      border:1px solid rgba(24,34,48,.08);
    }

    /* 5) Buttons read better on glass */
    .modal-close{
      background: rgba(255,255,255,.86);
      color:#111827;
      border:1px solid rgba(24,34,48,.16);
    }
    .btn{
      box-shadow: 0 8px 22px rgba(124,58,237,.22);
    }

    /* 6) Respect OS high-contrast preference */
    @media (prefers-contrast: more){
      .modal-panel{
        background: linear-gradient(0deg, rgba(255,255,255,.86), rgba(255,255,255,.92));
        border: 1px solid rgba(24,34,48,.22);
      }
      .modal-title{ color:#0b1220; text-shadow:none; }
      .modal-meta{ color:#1f2937; text-shadow:none; }
      .modal-desc{ color:#0b1220; text-shadow:none; }
      .kvlist .key{ color:#1f2937; text-shadow:none; }
      .kvlist .val{ color:#0b1220; text-shadow:none; }
      .modal-tags .tag{ background:#fff; border-color:rgba(24,34,48,.22); color:#0b1220; }
    }

    /* Optional: if you also want slightly clearer card text (uncomment)
    .card .desc{
      color:#1f2a3b;
      text-shadow: 0 1px 0 rgba(255,255,255,.25);
    } */
  
/* === Welcome overlay (floating, spinning book covers) === */
.welcome-overlay {
  position: fixed;
  inset: 0;
  z-index: 1200; /* above header, grid, and your modal */
  background: linear-gradient(180deg, rgba(255,255,255,.86), rgba(255,255,255,.70));
  backdrop-filter: blur(8px) saturate(120%);
  display: none; /* shown by JS on first load */
}

.welcome-overlay.open { display: block; }

.welcome-float-field {
  position: absolute; inset: 0;
  overflow: hidden; pointer-events: none; z-index: 0;
}

.float-book {
  position: absolute;
  opacity: .35;
  filter: drop-shadow(0 6px 16px rgba(16,24,40,.18));
  will-change: transform;
  user-select: none;
  pointer-events: none;
  mix-blend-mode: multiply; /* pretty with covers; safe to remove if you prefer */
  transform-origin: center center;
  image-rendering: -webkit-optimize-contrast;
}

/* Center card */
.welcome-card {
  position: relative; z-index: 1;
  width: min(720px, 92vw);
  margin: 0 auto; top: 50%; transform: translateY(-50%);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 28px 80px rgba(16,24,40,.22);
  padding: 24px 20px 20px;
  text-align: center;
  backdrop-filter: blur(10px) saturate(120%);
}

.welcome-card h2 { margin: 6px 0 10px; font-size: 1.6rem; font-weight: 900; }
.welcome-card p  { margin: 0 0 16px; color: var(--muted); }

/* animations */
@keyframes floatY {
  0%   { transform: translateY(var(--y0)) rotate(0deg) scale(var(--scale)); }
  50%  { transform: translateY(var(--y1)) rotate(180deg) scale(var(--scale)); }
  100% { transform: translateY(var(--y0)) rotate(360deg) scale(var(--scale)); }
}

@keyframes driftX {
  0%   { left: var(--x0); }
  100% { left: var(--x1); }
}

/* Motion-safety */
@media (prefers-reduced-motion: reduce) {
  .float-book { animation: none !important; }
}

/* When overlay is open, avoid background scroll (your CSS already has .body-lock) */
html.welcome-lock, body.welcome-lock { overflow: hidden; }
body.welcome-lock { position: fixed; width: 100%; }




/* iPad-friendly scrolling behavior */
@supports (-webkit-overflow-scrolling: touch){
  body{ -webkit-overflow-scrolling: touch; }
}

/* Sharper images on Retina iPad */
img{ image-rendering: -webkit-optimize-contrast; }


/* === Welcome Option B: Static Mosaic === */
.mosaic-grid { position: absolute; inset: 0; z-index: 0; display: grid; grid-template-columns: repeat(6, 1fr); grid-auto-rows: 1fr; gap: 10px; padding: 24px; pointer-events: none; opacity:.0; animation: mosaicFade .5s ease forwards; }
/* === Welcome overlay mini cover grid === */
.welcome-cover-grid{ position:absolute; inset:0; z-index:0; display:grid; grid-template-columns:repeat(8,1fr); gap:12px; padding:24px; opacity:.95; pointer-events:none;}
@media (max-width:1080px){ .welcome-cover-grid{ grid-template-columns:repeat(6,1fr);} }
@media (max-width:860px){ .welcome-cover-grid{ grid-template-columns:repeat(5,1fr);} }
@media (max-width:540px){ .welcome-cover-grid{ grid-template-columns:repeat(4,1fr); gap:8px; padding:16px;} }
.welcome-cover-tile{ width:100%; aspect-ratio:2/3; border-radius:12px; overflow:hidden; box-shadow:0 8px 22px rgba(16,24,40,.16); background:#e9eef6; border:1px solid rgba(24,34,48,.08);}
.welcome-cover-tile img{ width:100%; height:100%; object-fit:cover; display:block; image-rendering:-webkit-optimize-contrast; filter:none !important;}

.mosaic-cell { border-radius: 12px; background-size: cover; background-position: center; box-shadow: 0 8px 20px rgba(16,24,40,.12); }
@keyframes mosaicFade { to { opacity:.85; } }
@media (max-width: 860px){ .mosaic-grid{ grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 540px){ .mosaic-grid{ grid-template-columns: repeat(3, 1fr); } }

</style>
</head>
<body>
  <header>
    <div class="container">
      <div class="title-row" role="region" aria-label="Page title and controls">
        <div class="brand">
          <div class="brand-logo" aria-hidden="true"></div>
          <div>
            <h1 id="ui-title">Tuen Teen Book Fair Book Explorer</h1>
            <div id="ui-sub" class="sub">Browse by category • Search • Sort • Tap a card to view details</div>
          </div>
        </div>
        <div class="top-actions">
          <!-- Language selector -->
          <div class="lang" id="lang">
            <button id="langBtn" class="lang-btn" aria-haspopup="true" aria-expanded="false" aria-controls="langMenu">🌐 English</button>
            <div id="langMenu" class="lang-menu" role="menu">
              <div class="lang-option" data-lang="en" role="menuitem">🇬🇧 English</div>
              <div class="lang-option" data-lang="zh-Hant" role="menuitem">🇭🇰 繁體中文</div>
            </div>
          </div>

          <div class="controls">
            <label for="search" class="sr-only">Search books</label>
            <input id="search" type="search" class="input" placeholder="Search title, author, ISBN, publisher…" aria-label="Search books" />
            <label for="sort" class="sr-only">Sort books</label>
            <select id="sort" aria-label="Sort books">
              <option value="title-asc">Sort: Title (A → Z)</option>
              <option value="title-desc">Sort: Title (Z → A)</option>
              <option value="date-desc">Sort: Publish Date (New → Old)</option>
              <option value="date-asc">Sort: Publish Date (Old → New)</option>
              <option value="pages-desc">Sort: Pages (High → Low)</option>
              <option value="pages-asc">Sort: Pages (Low → High)</option>
            </select>
          </div>

          <!-- 🎲 Random Recommend Button -->
          <button id="randomBtn" class="rand-btn" aria-label="Pick a random book">🎲 Random</button>
        </div>
      </div>
      <nav class="pillbar" id="categoryBar" aria-label="Book categories"></nav>
    </div>
  </header>

<!-- 🟣 Welcome overlay (shown once) -->
<div id="welcomeOverlay" class="welcome-overlay" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle" aria-describedby="welcomeDesc">

  <div id=\"mosaic\" class=\"mosaic-grid\" aria-hidden=\"true\"></div>

  <!-- floating covers live here -->
  <div id="welcomeFloatField" class="welcome-float-field" aria-hidden="true"></div>
  <!-- NEW: mini cover grid -->
  <div id="welcomeCoverGrid" class="welcome-cover-grid" aria-hidden="true"></div>


  <!-- center card -->
  <div class="welcome-card">
    <div class="modal-accent" style="height:6px; background:linear-gradient(90deg, var(--primary), var(--accent-2));"></div>
    <h2 id="welcomeTitle">Welcome</h2>
    <p id="welcomeDesc">Browse and tap the button to enter the book list.</p>
    <button id="welcomeEnterBtn" class="btn" style="margin-top:6px;">Enter</button>
  </div>
</div>


  <main>
    <div class="container">
      <section aria-live="polite">
        <div id="grid" class="grid" role="list"></div>
        <div id="emptyState" class="empty" hidden>
          No books match your filters. Try clearing search or switching category.
        </div>
      </section>
    </div>
  </main>

  <footer id="ui-footer">
    Tap a card to view details
  </footer>

  <!-- Details Modal -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-accent" id="modalAccent"></div>
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div class="modal-inner">
        <img id="modalCover" class="modal-cover" alt="" loading="lazy" />
        <div>
          <h2 id="modalTitle" class="modal-title"></h2>
          <div id="modalMeta" class="modal-meta"></div>
          <div id="modalTags" class="modal-tags"></div>
          <div class="kvlist" id="modalKv"></div>
          <p id="modalDesc" class="modal-desc"></p>
        </div>
      </div>
      <div class="modal-actions">
        <button id="modalCloseBottom" class="btn ghost">Close</button>
      </div>
    </div>
  </div>

<script>
  /**
   * Chroma theme app logic with clarity patch active
   * + Random recommendation button (🎲)
   */

  // ===== i18n =====
  const I18N = {
    en: {

  function resolveBestCover(book) {
    const key = (book.isbn && "isbn:" + book.isbn) || (book.title && book.author && ("ta:" + book.title + "|" + book.author)) || ("rnd:" + Math.random());
    if (coverCache.has(key)) return Promise.resolve(coverCache.get(key));
    const candidates = chooseCoverCandidates(book);
    return new Promise((resolve) => {
      if (candidates.length === 1) { coverCache.set(key, candidates[0]); return resolve(candidates[0]); }
      let i = 0;
      const tryNext = () => {
        const url = candidates[i++];
        if (!url) { coverCache.set(key, fallbackCover); return resolve(fallbackCover); }
        if (url === fallbackCover) { coverCache.set(key, fallbackCover); return resolve(fallbackCover); }
        const test = new Image();
        test.onload = () => { coverCache.set(key, url); resolve(url); };

  // Card preview truncation: ≤20 English words OR ≤30 CJK chars
  function previewText(text, maxEngWords = 20, maxCjkChars = 30) {
    if (!text) return "";
    const s = String(text).trim();
    const engWords = s.match(/[A-Za-z0-9]+(?:'[A-Za-z0-9]+)?/g) || [];
    const cjkChars = s.match(/[\u4E00-\u9FFF\u3400-\u4DBF\uF900-\uFAFF\u3040-\u309F\u30A0-\u30FF\uAC00-\uD7AF]/g) || [];
    const needsEngTrunc = engWords.length > maxEngWords;
    const needsCjkTrunc = cjkChars.length > maxCjkChars;
    if (!needsEngTrunc && !needsCjkTrunc) return s;

    const segments = [];
    let m;
    const wordRe = /[A-Za-z0-9]+(?:'[A-Za-z0-9]+)?/g;
    while ((m = wordRe.exec(s)) !== null) segments.push({ type: 'eng', start: m.index, end: m.index + m[0].length });
    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      if (/[\u4E00-\u9FFF\u3400-\u4DBF\uF900-\uFAFF\u3040-\u309F\u30A0-\u30FF\uAC00-\uD7AF]/.test(ch)) {
        segments.push({ type: 'cjk', start: i, end: i+1 });
      }
    }
    segments.sort((a,b)=>a.start-b.start);

    let engCount = 0, cjkCount = 0, cutIndex = null;
    for (const seg of segments) {
      if (seg.type === 'eng') {
        engCount++;
        if (engCount === maxEngWords && needsEngTrunc && cutIndex === null) cutIndex = seg.end;
      } else {
        cjkCount++;
        if (cjkCount === maxCjkChars && needsCjkTrunc) {
          cutIndex = (cutIndex === null) ? seg.end : Math.min(cutIndex, seg.end);
        }
      }
    }
    if (cutIndex === null) {
      if (needsEngTrunc) {
        let w = 0; while ((m = wordRe.exec(s)) !== null) { w++; if (w === maxEngWords) { cutIndex = m.index + m[0].length; break; } }
      } else if (needsCjkTrunc) {
        let count = 0;
        for (let i = 0; i < s.length; i++) {
          if (/[\u4E00-\u9FFF\u3400-\u4DBF\uF900-\uFAFF\u3040-\u309F\u30A0-\u30FF\uAC00-\uD7AF]/.test(s[i])) {
            count++; if (count === maxCjkChars) { cutIndex = i+1; break; }
          }
        }
      }
    }
    if (cutIndex === null) return s;
    const trimmed = s.slice(0, cutIndex).trim().replace(/[.,;:!\s]*$/,'');

    const t = I18N[currentLang];

    const cat = firstCategory(book);
    modalAccent.style.background = `linear-gradient(90deg, ${colorForCategory(cat)}, #06b6d4)`;

    resolveBestCover(book).then(url => {
      modalCover.src = url;
      modalCover.alt = t.modal.coverAlt(book.title||"");
      modalCover.style.display = "block";
    });

    modalTitle.textContent = book.title || "";
    const sep = ` ${t.modal.metaSep} `;
    const year = getYear(book.publish_date);
    const cats = allCategories(book).map(labelForCategory).join(", ");
    modalMeta.innerHTML = `
      <span>${book.author || ""}</span>
      ${book.author && (cats || year) ? `<span>${sep}</span>` : ""}
      ${cats ? `<span>${cats}</span>` : ""}
      ${year ? `<span>${sep}</span><span>${year}</span>` : ""}
    `;

    modalTags.innerHTML = allCategories(book)
      .map(c => `<span class="tag">${labelForCategory(c)}</span>`)
      .join("");

    const tFields = I18N[currentLang].fields;
    modalKv.innerHTML = `
      ${book.publisher ? `<div class="key">${tFields.publisher}</div><div class="val">${book.publisher}</div>` : ""}
      ${book.language ? `<div class="key">${tFields.language}</div><div class="val">${displayLanguage(book.language)}</div>` : ""}
      ${book.pages ? `<div class="key">${tFields.pages}</div><div class="val">${book.pages}</div>` : ""}
      ${book.publish_date ? `<div class="key">${tFields.publish_date}</div><div class="val">${book.publish_date}</div>` : ""}
      ${book.isbn ? `<div class="key">${tFields.isbn}</div><div class="val">${book.isbn}</div>` : ""}
    `;

    modalDesc.textContent = book.description || "";

    lockBodyScroll();
    modal.classList.add("open");
    modal.setAttribute("aria-hidden","false");
    modalCloseTop.focus();
  }
  function closeModal(){
    modal.classList.remove("open");
    modal.setAttribute("aria-hidden","true");
    unlockBodyScroll();
    if(lastFocus) lastFocus.focus();
  }
  modal.addEventListener("click", (e)=>{
    const panel = e.target.closest(".modal-panel");
    if(!panel){ closeModal(); }
  });
  modalCloseTop.addEventListener("click", closeModal);
  modalCloseBottom.addEventListener("click", closeModal);
  window.addEventListener("keydown", (e)=>{
    if(e.key === "Escape" && modal.classList.contains("open")) closeModal();
  });

  // ===== Events =====
  document.getElementById("search").addEventListener("input", (e)=>{ state.search = e.target.value; renderBooks(); });
  document.getElementById("sort").addEventListener("change", (e)=>{ state.sort = e.target.value; renderBooks(); });

  // Language menu
  const langWrap = document.getElementById("lang");
  const langBtn = document.getElementById("langBtn");
  const langMenu = document.getElementById("langMenu");
  langBtn.addEventListener("click", ()=>{
    const open = langWrap.classList.toggle("open");
    langBtn.setAttribute("aria-expanded", open ? "true":"false");
  });
  langMenu.addEventListener("click", (e)=>{
    const opt = e.target.closest(".lang-option");
    if(!opt) return;
    applyLang(opt.dataset.lang);
    langWrap.classList.remove("open");
    langBtn.setAttribute("aria-expanded","false");
  });
  document.addEventListener("click", (e)=>{
    if(!langWrap.contains(e.target)){
      langWrap.classList.remove("open");
      langBtn.setAttribute("aria-expanded","false");
    }
  });

  // 🎲 Random button behavior
  function pickRandom(){
    const t = I18N[currentLang];
    const filtered = currentFilteredBooks();
    const pool = filtered.length ? filtered : books;
    if(!pool || pool.length === 0){
      alert(t.randomNone);
      return;
    }
    const idx = Math.floor(Math.random() * pool.length);
    const book = pool[idx];
    openModal(book, randomBtn);
  }
  randomBtn.addEventListener('click', pickRandom);
  randomBtn.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      pickRandom();
    }
  });

  // ===== Init =====
  applyLang(currentLang);

// === Welcome overlay i18n extension ===
try {
  I18N.en.welcome = I18N.en.welcome || { title: "Welcome to the Tuen Teen Book Fair", desc: "Enjoy exploring the collection. Tap the button to enter.", enter: "Enter" };
  (I18N["zh-Hant"]) && (I18N["zh-Hant"].welcome = I18N["zh-Hant"].welcome || { title: "歡迎來到屯天書展", desc: "盡情探索精選書目，點擊按鈕進入書單。", enter: "進入" });
} catch (e) { /* noop */ }

const WELCOME_KEY = "welcome-seen-v1";

function updateWelcomeTexts() {
  const L = I18N[currentLang] || I18N.en;
  const t = (L && L.welcome) ? L.welcome : I18N.en.welcome;
  const $title = document.getElementById("welcomeTitle");
  const $desc  = document.getElementById("welcomeDesc");
  const $btn   = document.getElementById("welcomeEnterBtn");
  if ($title) $title.textContent = t.title;
  if ($desc)  $desc.textContent  = t.desc;
  if ($btn)   $btn.textContent   = t.enter;
}

function renderFloatingCovers() {
  const field = document.getElementById("welcomeFloatField");
  if (!field) return;
  const covers = (typeof books !== 'undefined' ? books : [])
    .map(b => b.cover_base64 || b.cover64 || b.cover)
    .filter(Boolean);
  if (!covers.length) { field.innerHTML = ""; return; }
  field.innerHTML = "";
  const COUNT = Math.min(covers.length, 28);
  for (let i = 0; i < COUNT; i++) {
    const img = new Image();
    img.className = "float-book";
    img.decoding = 'async';
    img.loading = 'eager';
    img.fetchPriority = 'low';
    img.src = `data:image/jpeg;base64,${covers[i % covers.length]}`;
    const size = 70 + Math.random() * 120;
    const x0 = Math.random() * 100;
    const x1 = (Math.random() < 0.5 ? -20 : 120);
    const y0 = Math.random() * 70;
    const yAmp = 12 + Math.random() * 22;
    const scale = 0.9 + Math.random() * 0.4;
    const floatDur = 12 + Math.random() * 18;
    const driftDur = 24 + Math.random() * 36;
    const delay    = Math.random() * 8;
    img.style.width = `${size}px`;
    img.style.left  = `${x0}%`;
    img.style.top   = `${y0}vh`;
    img.style.setProperty("--x0", `${x0}%`);
    img.style.setProperty("--x1", `${x1}%`);
    img.style.setProperty("--y0", `0px`);
    img.style.setProperty("--y1", `-${yAmp}px`);
    img.style.setProperty("--scale", scale.toFixed(2));
    img.style.animation =
      `floatY ${floatDur}s ease-in-out ${delay}s infinite alternate, ` +
      `driftX ${driftDur}s linear ${delay}s infinite`;
    field.appendChild(img);
  }
}

function openWelcome(){
  const ov = document.getElementById('welcomeOverlay'); if(!ov) return;
  updateWelcomeTexts();
  buildMosaic();
  ov.classList.add('open');
  document.documentElement.classList.add('welcome-lock');
  document.body.classList.add('welcome-lock');
  setTimeout(()=>document.getElementById('welcomeEnterBtn')?.focus(),0);
}

function closeWelcome(){
  const ov = document.getElementById('welcomeOverlay'); if(!ov) return;
  ov.classList.remove('open');
  document.documentElement.classList.remove('welcome-lock');
  document.body.classList.remove('welcome-lock');
  const m = document.getElementById('mosaic'); if(m) m.innerHTML='';
}


function buildMosaic(){
  const grid = document.getElementById('mosaic'); if(!grid) return;
  grid.innerHTML = '';
  const covers = (typeof books !== 'undefined' ? books : []).map(b=> b.cover_base64 || b.cover64 || b.cover).filter(Boolean);
  if (!covers.length){ grid.style.display='none'; return; }
  const TOTAL = Math.min(24, covers.length);
  for(let i=0;i<TOTAL;i++){
    const div = document.createElement('div');
    div.className = 'mosaic-cell';
    const idx = (i*5) % covers.length;
    div.style.backgroundImage = `url(data:image/jpeg;base64,${covers[idx]})`;
    grid.appendChild(div);
  }
}
function initWelcomeOverlay() {
  document.getElementById("welcomeEnterBtn")?.addEventListener("click", closeWelcome);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && document.getElementById("welcomeOverlay")?.classList.contains("open")) {
      closeWelcome();
    }
  });
  requestAnimationFrame(()=>{ requestAnimationFrame(openWelcome); });
  const langMenu = document.getElementById("langMenu");
  langMenu?.addEventListener("click", () => setTimeout(updateWelcomeTexts, 0));
  let resizeTimer;
  window.addEventListener("resize", () => {
    if (!document.getElementById("welcomeOverlay")?.classList.contains("open")) return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderFloatingCovers, 250);
  }, { passive: true });
}
if (document.readyState !== 'loading') initWelcomeOverlay();
else document.addEventListener('DOMContentLoaded', initWelcomeOverlay);


// === Welcome robust helpers (covers + ensure + iPad data URLs) ===
function __coversFromBooks() {
  const list = (typeof books !== 'undefined' && Array.isArray(books)) ? books : [];
  return list.map(b => b && (b.cover_base64 || b.cover64 || b.cover)).filter(Boolean);
}
function __ensureEl(id, html){
  let el = document.getElementById(id);
  if (!el && html){
    const ov = document.getElementById('welcomeOverlay');
    if (ov){
      const tmp = document.createElement('div');
      tmp.innerHTML = html.trim();
      ov.appendChild(tmp.firstElementChild);
      el = document.getElementById(id);
    }
  }
  return el;
}


// === Option B override: safer buildMosaic (explicit JPEG) ===
function buildMosaic(){
  let grid = document.getElementById('mosaic');
  if (!grid){ __ensureEl('mosaic','<div id="mosaic" class="mosaic-grid" aria-hidden="true"></div>'); grid = document.getElementById('mosaic'); }
  if (!grid) { console.warn('[welcome] mosaic missing'); return; }
  grid.innerHTML = '';
  const covers = __coversFromBooks();
  console.debug('[welcome] mosaic covers:', covers.length);
  if (!covers.length){ grid.style.display='none'; return; }
  const TOTAL = Math.min(24, covers.length);
  for (let i=0; i<TOTAL; i++){
    const div = document.createElement('div');
    div.className = 'mosaic-cell';
    const idx = (i*5) % covers.length;
    div.style.backgroundImage = `url(data:image/jpeg;base64,${covers[idx]})`;
    grid.appendChild(div);
  }
}



// === Welcome overlay cover grid renderer ===
function renderWelcomeCoverGrid(limit = 32){
  const host = document.getElementById('welcomeCoverGrid');
  if (!host) return;
  const pool = Array.from(books || []);
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const sample = pool.slice(0, Math.min(limit, pool.length));
  host.innerHTML = '';
  sample.forEach(book => {
    const tile = document.createElement('div');
    tile.className = 'welcome-cover-tile';
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.alt = '';
    resolveBestCover(book).then(url => { img.src = url; })
                          .catch(() => { img.src = 'book_cover/placeholder.png'; });
    tile.appendChild(img);
    host.appendChild(tile);
  });
}
(function initWelcomeGrid(){
  const overlay = document.getElementById('welcomeOverlay');
  if (!overlay) return;
  try { renderWelcomeCoverGrid(32); } catch(e){}
})();
